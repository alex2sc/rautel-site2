    <style>
        /* Ajustări pentru slider să arate ca în swipe.html */
        .slider-container {
            display: flex;
            justify-content: center;
            padding: 20px 0;
            background: #fdfdfd;
        }
        .slider {
            position: relative;
            width: 90%;
            max-width: 800px;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .slider img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            display: block;
        }
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(45, 64, 87, 0.8);
            color: white;
            border: none;
            padding: 15px 20px;
            cursor: pointer;
            font-size: 20px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .prev { left: 10px; }
        .next { right: 10px; }
        .prev:hover, .next:hover { background: #131b31; }
    </style>
    <script>
    // AICI scrii denumirile pozelor tale care se află în folderul images
    let images = [
        "../images/slide1.jpg", 
        "../images/slide2.jpg",
        "../images/slide3.jpg",
    ];

    let index = 0;

    // Această funcție schimbă poza pe ecran
    function showSlide() {
        const imgElement = document.getElementById("slide");
        if (imgElement) {
            imgElement.src = images[index];
        }
    }

    function nextSlide() {
        index = (index + 1) % images.length;
        showSlide();
    }

    function prevSlide() {
        index = (index - 1 + images.length) % images.length;
        showSlide();
    }

    // Această parte face să meargă SWIPE-ul pe telefon
    let startX = 0;
    const slideImg = document.getElementById("slide");

    if (slideImg) {
        slideImg.addEventListener("touchstart", function(e) {
            startX = e.touches[0].clientX;
        });

        slideImg.addEventListener("touchend", function(e) {
            let endX = e.changedTouches[0].clientX;
            if (startX > endX + 50) nextSlide(); // Degetul s-a mișcat la stânga
            if (startX < endX - 50) prevSlide(); // Degetul s-a mișcat la dreapta
        });
    }
</script>
